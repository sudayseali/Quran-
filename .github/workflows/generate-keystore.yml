name: Generate Keystore

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key Alias (e.g. xirfadsame)'
        required: true
        default: 'xirfadsame'
      password:
        description: 'Keystore Password (must be at least 6 characters)'
        required: true
        default: 'xirfadsame123Aq1Re!'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore my-upload-key.keystore -alias ${{ github.event.inputs.alias }} -keyalg RSA -keysize 2048 -validity 10000 -storepass ${{ github.event.inputs.password }} -keypass ${{ github.event.inputs.password }} -dname "CN=Al Quran, OU=App, O=Al Quran, L=City, S=State, C=US"
          
          echo "Your KEYSTORE_BASE64 values is below:"
          echo "========================================"
          base64 my-upload-key.keystore | tr -d '\n'
          echo ""
          echo "========================================"
          
          echo "Copy the large Base64 text above and save it as your KEYSTORE_BASE64 secret in GitHub Secrets."
          
      - name: Upload Keystore file
        uses: actions/upload-artifact@v4
        with:
          name: output-keystore
          path: my-upload-key.keystore
