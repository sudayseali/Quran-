name: Build Android Signed Bundle

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo $ENCODED_STRING | base64 --decode > android/app/keystore/upload-keystore.jks

      - name: Build Release Bundle (AAB)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease -Pandroid.injected.signing.storeFile=$(pwd)/app/keystore/upload-keystore.jks -Pandroid.injected.signing.storePassword=$STORE_PASSWORD -Pandroid.injected.signing.keyAlias=$KEY_ALIAS -Pandroid.injected.signing.keyPassword=$KEY_PASSWORD

      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
