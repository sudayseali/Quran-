name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Ensure Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      # To use this for release builds, add your keystore base64 string, store password, key alias, and key password 
      # to your GitHub Repository Secrets and uncomment the following block.
      #
      # - name: Setup Keystore
      #   run: |
      #     echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 --decode > android/app/keystore.jks
      #     echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> android/local.properties
      #     echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/local.properties
      #     echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
      #     echo "storeFile=keystore.jks" >> android/local.properties

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
          
      # Uncomment to build Release APK if keystore is configured
      # - name: Build Release APK
      #   working-directory: android
      #   run: |
      #     ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # - name: Upload Release APK
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: app-release
      #     path: android/app/build/outputs/apk/release/app-release.apk
